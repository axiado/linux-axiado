%YAML 1.2
---
$id: http://devicetree.org/schemas/misc/axiado,ax-fwupgrade.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Axiado Firmware Update Driver

maintainers:
  - Adarsh Kumar <axiado-1509@axiado.com>
  - Sridhar Pothuganti <spothuganti@axiado.com>
  - Prasad Bolisetty <pbolisetty@axiado.com>

description: |
    Axiado firmware upgrade character device. The driver maps a shared memory
    buffer provided via a single MMIO resource and exposes it to userspace via
    mmap() for firmware update operations. The node must supply one memory
    resource describing the buffer address and size.

properties:
  compatible:
    const: axiado,ax-fwupgrade

  reg:
    maxItems: 1
    description:
      MMIO region for the shared data buffer used during firmware upgrade.

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    soc{
        #address-cells = <2>;
        #size-cells = <2>;

        update: fw-update@4A00000 {
                    compatible = "axiado,ax-fwupgrade";
                    reg = <0x00000000 0x04A00000 0x00000000 0x8000000>;
                    status = "okay";
        };
    };
