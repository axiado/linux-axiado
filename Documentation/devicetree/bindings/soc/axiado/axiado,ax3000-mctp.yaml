%YAML 1.2
---
$id: http://devicetree.org/schemas/soc/axiado/axiado,ax3000-mctp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Axiado MCTP driver

maintainers:
  - Shubhangini <shubhangini@axiado.com>
  - Sanket Parmar <sparmar@axiado.com>
  - Makarand Pawagi <mpawagi@axiado.com>
  - Prasad Bolisetty <pbolisetty@axiado.com>

description: |
  MCTP driver that deals with VDM messaging and adds hooks
  to the MCTP userspace lib.

properties:
  compatible:
    const: axiado,ax3000-mctp

  reg:
    description: OCM Base Address

  reg-names:
    const: ocm-base

  axrc-version:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: For determining A0, B0, etc., encodes whether this is
      EP or RC as well. For EPs, bit 8 is set to 0x1.

  axrc-vdm-id:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: For axrc-version == 1, this indicates which RC to bind
      for VDM generation. <2> -> X2, <1> -> X1

  isolated-cpu:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Isolated CPU number, Used to bind the OCM thread.

  pcie-phandle:
    $ref: /schemas/types.yaml#/definitions/phandle
    description: phandle of PCIe controller.

required:
  - compatible
  - reg
  - reg-names
  - axrc-version
  - axrc-vdm-id
  - isolated-cpu
  - pcie-phandle

additionalProperties: false

examples:
  - |
    mctp {
      compatible = "axiado,ax3000-mctp";
      reg = <0x0 0x802E0000 0x00 0x20000>;
      reg-names = "ocm-base";
      axrc-version = <0x001>;
      axrc-vdm-id = <2>;
      isolated-cpu = <3>;
      pcie-phandle = <&pcie_x2>;
    };
