%YAML 1.2
---
$id: http://devicetree.org/schemas/soc/axiado/axiado,ax3000-espi.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Axiado eSPI Slave Controller

maintainers:
  - Satya Jena <sjena@axiado.com>
  - Makarand Pawagi <mpawagi@axiado.com>
  - Prasad Bolisetty <pbolisetty@axiado.com>

description: |
  The Axiado eSPI slave controller provides connectivity between a host system
  and embedded peripheral devices. The controller handles eSPI protocol
  communication and provides interrupt management for child peripheral devices.

  The controller supports two deployment modes:
  - MFD mode: Child device of Axiado MFD SPI bridge with regmap-based access
  - MMIO mode: Direct MMIO access to eSPI controller registers

properties:
  compatible:
    enum:
      - axiado,ax3000-espi          # Direct MMIO mode
      - axiado,ax3000-espi-regmap   # MFD regmap mode

  reg:
    items:
      - description: eSPI core registers
      - description: eSPI peripheral registers
      - description: eSPI ATU/CSR registers

  reg-names:
    items:
      - const: espi-core
      - const: espi-perif
      - const: espi-atu

  interrupts:
    items:
      - description: eSPI IP core interrupt
      - description: External logic interrupt for peripherals

  interrupt-names:
    items:
      - const: espi-core-intr
      - const: ext-logic-intr

  interrupt-controller: true

  "#interrupt-cells":
    const: 1
    description: |
      Interrupt specifier for child devices. The cell contains the virtual
      interrupt number corresponding to bits in the external logic ISR register.

  "#address-cells":
    const: 1

  "#size-cells":
    const: 1

  axiado,fifo-flush-timeout-ms:
    description: Timeout for FIFO flush operations in milliseconds
    default: 100
    minimum: 1
    maximum: 1000

  axiado,poll-delay-min-us:
    description: Minimum polling delay in microseconds
    default: 10
    minimum: 1
    maximum: 100

  axiado,poll-delay-max-us:
    description: Maximum polling delay in microseconds
    default: 20
    minimum: 1
    maximum: 100

  axiado,max-retries:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Maximum number of retry attempts for operations
    default: 3
    minimum: 1
    maximum: 10

patternProperties:
  "^[a-zA-Z0-9-]+@[0-9a-f]+$":
    type: object
    description: Child peripheral devices

required:
  - compatible
  - reg
  - interrupts
  - interrupt-names
  - interrupt-controller
  - "#interrupt-cells"
  - "#address-cells"
  - "#size-cells"

additionalProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>

    mfd_espi: espi@c000 {
        compatible = "axiado,ax3000-espi-regmap";
        reg = <0xc000 0x1000>,
              <0xd000 0x1000>,
              <0xe000 0x1000>;
        reg-names = "espi-core", "espi-perif", "espi-atu";
        interrupt-parent = <&gpio6>;
        interrupts = <19 IRQ_TYPE_LEVEL_HIGH>,
                     <23 IRQ_TYPE_LEVEL_HIGH>;
        interrupt-names = "espi-core-intr", "ext-logic-intr";
        interrupt-controller;
        #interrupt-cells = <1>;
        #address-cells = <1>;
        #size-cells = <1>;

        axiado,fifo-flush-timeout-ms = <100>;
        axiado,poll-delay-min-us = <10>;
        axiado,poll-delay-max-us = <20>;
        axiado,max-retries = <3>;
    };

  - |
    #include <dt-bindings/interrupt-controller/irq.h>

    mmio_espi: espi@40000000 {
        compatible = "axiado,ax3000-espi";
        reg = <0x40000000 0x1000>,
              <0x40001000 0x1000>,
              <0x40002000 0x1000>;
        reg-names = "espi-core", "espi-perif", "espi-atu";
        interrupt-parent = <&gic>;
        interrupts = <0 45 IRQ_TYPE_LEVEL_HIGH>,
                     <0 46 IRQ_TYPE_LEVEL_HIGH>;
        interrupt-names = "espi-core-intr", "ext-logic-intr";
        interrupt-controller;
        #interrupt-cells = <1>;
        #address-cells = <1>;
        #size-cells = <1>;
    };
