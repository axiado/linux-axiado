%YAML 1.2
---
$id: http://devicetree.org/schemas/soc/axiado/axiado,ax3000-espi-snoop.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Axiado eSPI Snoop Driver

maintainers:
  - Rajan Patel <rpatel@axiado.com>
  - Satya Jena <sjena@axiado.com>
  - Makarand Pawagi <mpawagi@axiado.com>
  - Prasad Bolisetty <pbolisetty@axiado.com>

description: |
  The eSPI Snoop device captures the Port80 POST codes transmitted from host
  over the eSPI bus. It provides a simple FIFO interface and interrupt
  signaling when new POST codes are available.

  This device is child device of eSPI Controller the Axiado MFD SPI bridge.
  Register access is performed via SPI to the TCU.

  The controller handles eSPI protocol communication and provides interrupt
  management for child peripheral devices like snoop.

properties:
  compatible:
    const: axiado,ax3000-espi-snoop

  reg:
    maxItems: 1
    description:
      Register offset within the parent eSPI controller's peripheral
      register space. This is not a physical address but an offset
      used with the parent's regmap interface.

  interrupts:
    maxItems: 1
    description:
      Virtual IRQ number from the parent eSPI controller's external
      logic IRQ chip. This is the bit position in the external ISR
      register, not a hardware IRQ number.

  io-addr:
    $ref: /schemas/types.yaml#/definitions/uint32
    description:
      Host I/O port address for this Snoop driver. This is the address
      that the host system uses to access to send system data. Standard
      port address is 0x80.

  addr-size:
    $ref: /schemas/types.yaml#/definitions/uint32
    description:
      Optional property that value specifies how many consecutive bytes are
      valid starting from the base address defined in the reg property.
      If not provided, the driver defaults to 4 bytes (0x80–0x83),
      corresponding to a 32-bit PostCode register.

required:
  - compatible
  - reg
  - interrupts
  - io-addr

additionalProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>

    espi_snoop: espi-snoop@C0 {
      compatible = "axiado,ax3000-espi-snoop";
      reg = <0xc0 0x10>;
      interrupts = <13>;
      interrupt-parent = <&mfd_espi>;
      io-addr = <0x80>;
      status = "okay";
    };

