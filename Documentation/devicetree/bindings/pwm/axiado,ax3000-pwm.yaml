%YAML 1.2
---
$id: http://devicetree.org/schemas/pwm/axiado,ax3000-pwm.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Axiado AX3000 PWM

maintainers:
  - Akhila Kavi <akavi@axiado.com>
  - Makarand Pawagi <mpawagi@axiado.com>

description: |+
  Bindings for PWM on Axiado AX3000 SoC.

  - compatible:         Should be one of the following:
                        "axiado,ax3000-pwm"
  - reg:
      maxItems: 1

properties:
  compatible:
    enum:
      - axiado,ax3000-pwm

  "#pwm-cells":
    const: 2

  reg:
    maxItems: 1

  clocks:
    maxItems: 2
    description: phandle of the clock used by the PWM module

  interrupts:
    maxItems: 1
    description: IRQ for the Capture device

required:
  - compatible
  - reg
  - clocks
  - interrupts
  - '#pwm-cells'

additionalProperties: false

examples:
  - |
    pwm0: pwm@80500C00 {
    compatible = "axiado,ax3000-pwm";
    reg = <0x80801C00 0x1000>;
    #pwm-cells = <2>;
    clocks = <&refclk &refclk>;
    interrupt-parent = <&gic500>;
    interrupts = <0 93 4>;
    status = "disabled";
    };
...
