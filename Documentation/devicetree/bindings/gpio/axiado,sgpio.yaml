%YAML 1.2
---
$id: http://devicetree.org/schemas/gpio/axiado,sgpio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Axiado SGPIO Controller

maintainers:
  - Tzu-Hao Wei <twei@axiado.com>
  - Swark Yang <syang@axiado.com>
  - Prasad Bolisetty <pbolisetty@axiado.com>

properties:
  compatible:
    enum:
      - axiado,sgpio

  reg:
    maxItems: 1

  gpio-controller: true

  '#gpio-cells':
    const: 2

  interrupts:
    maxItems: 1

  interrupt-controller: true

  '#interrupt-cells':
    const: 2

  clocks:
    maxItems: 1

  ngpios:
    description: The number of gpios this controller has.
    $ref: /schemas/types.yaml#/definitions/uint32

  bus-frequency:
    description: The SGPIO shift clock frequency in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  apb-frequency:
    description: The APB bus frequency in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  dout-init:
    description: Initial values for the dout registers.
    $ref: /schemas/types.yaml#/definitions/uint32-array
    minItems: 4
    maxItems: 4

  design-variant:
    description:
      Describes the hardware design variant, e.g., 128 for a 128-bit internal bus.
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - reg
  - gpio-controller
  - '#gpio-cells'
  - interrupts
  - interrupt-controller
  - '#interrupt-cells'
  - clocks
  - ngpios
  - bus-frequency
  - apb-frequency
  - dout-init

additionalProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>

    sgpio0: sgpio@a000 {
            compatible = "axiado,sgpio";
            reg = <0xa000 0x800>;
            gpio-controller;
            #gpio-cells = <2>;

            interrupt-controller;
            #interrupt-cells = <2>;
            interrupt-parent = <&gpio6>;
            interrupts = <17 IRQ_TYPE_LEVEL_HIGH>;

            clocks = <&sysclk>;
            ngpios = <128>;
            bus-frequency = <1000000>;      /* Shift clock frequency - 1 MHz */
            apb-frequency = <100000000>;   /* FPGA frequency - 100 MHz */
            dout-init = <0x00300000 0x00006371 0x00003800 0x00000000>;
    };
