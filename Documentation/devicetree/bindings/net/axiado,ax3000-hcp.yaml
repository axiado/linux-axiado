%YAML 1.2
---
$id: http://devicetree.org/schemas/net/axiado,ax3000-hcp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Axiado AX3000 HCP (Header and Crypto Processing Engine)

maintainers:
  - Satya Jena <sjena@axiado.com>
  - Mirza Aijaz Baig <mbaig@axiado.com>
  - Makarand Pawagi <mpawagi@axiado.com>
  - Prasad Bolisetty <pbolisetty@axiado.com>

description: |
  The Axiado HCP is a unified network and cryptographic subsystem found in
  the Axiado AX3000 SoC. It integrates:
  - 5 Ethernet MACs (one 10Gbps RXAUI, four 1Gbps SGMII/RMII)
  - SHIM packet interface with FIFO-based packet processing
  - Rambus EIP-197 hardware crypto accelerator
  - MDIO bus controller for PHY management

  The driver creates network devices (ethX) based on enabled MAC nodes.

properties:
  compatible:
    const: axiado,ax3000-hcp

  reg:
    items:
      - description: EIP-197 crypto engine registers
      - description: SHIM packet interface registers
      - description: PHY CSR (Control and Status Registers)

  reg-names:
    items:
      - const: eip197
      - const: shim
      - const: phy-csr

  interrupts:
    description: |
      Interrupt lines for HCP subsystem. The list is positional and must
      be in the exact order shown below (and match interrupt-names).
    items:
      - description: EIP-197 crypto engine
      - description: EIP Ring interface 0
      - description: EIP Ring interface 1
      - description: EIP Ring interface 2
      - description: EIP Ring interface 3
      - description: MAC interface 0
      - description: MAC interface 1
      - description: MAC interface 2
      - description: MAC interface 3
      - description: MAC interface 4
      - description: EIP Ring interface 4
      - description: EIP Ring interface 5
      - description: EIP Ring interface 6
      - description: EIP Ring interface 7
      - description: EIP Ring interface 8
      - description: EIP Ring interface 9
      - description: EIP Ring interface 10
      - description: EIP Ring interface 11

  interrupt-names:
    items:
      - const: eip197
      - const: eip_ring0
      - const: eip_ring1
      - const: eip_ring2
      - const: eip_ring3
      - const: xgmii
      - const: gmii0
      - const: gmii1
      - const: gmii2
      - const: gmii3
      - const: eip_ring4
      - const: eip_ring5
      - const: eip_ring6
      - const: eip_ring7
      - const: eip_ring8
      - const: eip_ring9
      - const: eip_ring10
      - const: eip_ring11

  clocks:
    maxItems: 1
    description: Optional EIP-197 clock

  clock-names:
    items:
      - const: eip197

  '#address-cells':
    const: 1

  '#size-cells':
    const: 0

  mdio:
    type: object
    $ref: /schemas/net/mdio.yaml#
    description: |
      MDIO bus controller for managing external PHY devices.

    properties:
      compatible:
        const: axiado,ax3000-mdio

    required:
      - compatible

    unevaluatedProperties: false

patternProperties:
  '^mac@[0-4]$':
    type: object
    $ref: ethernet-controller.yaml#
    description: |
      Ethernet MAC interface nodes. Each MAC can be independently enabled/
      disabled and configured via device tree. MACs with status="okay" are
      initialized; MACs with status="disabled" are skipped.

    properties:
      compatible:
        const: axiado,ax3000-mac

      reg:
        maxItems: 1
        description: MAC index (0-4)

      phy-mode:
        description: PHY interface mode
        enum:
          - rxaui
          - sgmii
          - rmii

      phy-handle:
        description: |
          Phandle to external PHY device on MDIO bus. If absent, MAC uses
          internal PHY in SGMII mode or in other modes based on additional
          settings when the MAC is enabled.

    required:
      - compatible
      - reg
      - phy-mode

    unevaluatedProperties: false

required:
  - compatible
  - reg
  - reg-names
  - interrupts
  - interrupt-names

additionalProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>
    #include <dt-bindings/interrupt-controller/arm-gic.h>

    soc {
        #address-cells = <1>;
        #size-cells = <1>;

        hcp@83000000 {
            compatible = "axiado,ax3000-hcp";
            reg = <0x83000000 0x100000>,  /* EIP-197: 1MB */
                  <0x83100000 0x4000>,    /* SHIM: 16KB */
                  <0x87000000 0x50000>;   /* PHY CSR: 320KB */
            reg-names = "eip197", "shim", "phy-csr";

            interrupt-parent = <&gic500>;
            interrupts = <GIC_SPI 32 IRQ_TYPE_LEVEL_HIGH>,  /* EIP-197 */
                     <GIC_SPI 1 IRQ_TYPE_LEVEL_HIGH>,   /* Ring 0 */
                     <GIC_SPI 2 IRQ_TYPE_LEVEL_HIGH>,   /* Ring 1 */
                     <GIC_SPI 3 IRQ_TYPE_LEVEL_HIGH>,   /* Ring 2 */
                     <GIC_SPI 4 IRQ_TYPE_LEVEL_HIGH>,   /* Ring 3 */
                     <GIC_SPI 5 IRQ_TYPE_LEVEL_HIGH>,   /* MAC 0 */
                     <GIC_SPI 6 IRQ_TYPE_LEVEL_HIGH>,   /* MAC 1 */
                     <GIC_SPI 7 IRQ_TYPE_LEVEL_HIGH>,   /* MAC 2 */
                     <GIC_SPI 8 IRQ_TYPE_LEVEL_HIGH>,   /* MAC 3 */
                     <GIC_SPI 9 IRQ_TYPE_LEVEL_HIGH>;   /* MAC 4 */
            interrupt-names = "eip197", "ring0", "ring1", "ring2", "ring3",
                              "mac0", "mac1", "mac2", "mac3", "mac4";

            clocks = <&clk_eip197>;
            clock-names = "eip197";

            #address-cells = <1>;
            #size-cells = <0>;

            /* 10G RXAUI MAC - eth1 */
            mac@0 {
                compatible = "axiado,ax3000-mac";
                reg = <0>;
                phy-mode = "rxaui";
                phy-handle = <&phy0>;
                status = "okay";
            };

            /* 1G SGMII MAC - eth0 (primary) */
            mac@4 {
                compatible = "axiado,ax3000-mac";
                reg = <4>;
                phy-mode = "sgmii";
                phy-handle = <&phy4>;
                status = "okay";
            };

            /* Other MACs disabled */
            mac@1 {
                compatible = "axiado,ax3000-mac";
                reg = <1>;
                phy-mode = "sgmii";
                status = "disabled";
            };

            mac@2 {
                compatible = "axiado,ax3000-mac";
                reg = <2>;
                phy-mode = "sgmii";
                status = "disabled";
            };

            mac@3 {
                compatible = "axiado,ax3000-mac";
                reg = <3>;
                phy-mode = "sgmii";
                status = "disabled";
            };

            /* MDIO bus */
            mdio {
                compatible = "axiado,ax3000-mdio";
                #address-cells = <1>;
                #size-cells = <0>;

                phy0: ethernet-phy@0 {
                    reg = <0>;
                    compatible = "ethernet-phy-ieee802.3-c22";
                };

                phy4: ethernet-phy@4 {
                    reg = <4>;
                    compatible = "ethernet-phy-ieee802.3-c22";
                };
            };
        };
    };
