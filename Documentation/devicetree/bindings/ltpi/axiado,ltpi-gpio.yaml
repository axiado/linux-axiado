%YAML 1.2
---
$id: http://devicetree.org/schemas/ltpi/axiado,ltpi-gpio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Axiado LTPI GPIO Driver

maintainers:
  - Tzu-Hao Wei <twei@axiado.com>
  - Swark Yang <syang@axiado.com>
  - Prasad Bolisetty <pbolisetty@axiado.com>

description: |
  The Axiado LTPI (Low-Speed Transport Protocol Interface) GPIO driver provides
  a GPIO controller that offers bidirectional GPIO functionality with interrupt support.
  It supports both input and output GPIO lines with configurable initial output values.

  The LTPI GPIO driver can operate in two modes:
  1. Direct memory mapping mode - when reg property provides memory region
  2. Regmap mode - when parent device provides regmap interface

properties:
  compatible:
    const: axiado,ltpi

  reg:
    description: |
      Memory region for LTPI registers. Contains base address and size.
      When used with regmap mode, the base address represents the offset
      within the parent device's regmap.
    maxItems: 1

  gpio-controller: true

  '#gpio-cells':
    description: |
      Must be 2. The first cell is the GPIO number and the second cell
      is used to specify flags. The first half of GPIOs (0 to ngpios-1)
      are output-only, the second half (ngpios to 2*ngpios-1) are input-only.
    const: 2

  interrupt-controller: true

  '#interrupt-cells':
    description: |
      Must be 2. The first cell is the interrupt number and the second
      cell is used to specify flags.
    const: 2

  interrupts:
    description: |
      Interrupt specifier for the LTPI GPIO driver. This interrupt is
      triggered when input GPIO state changes.
    maxItems: 1

  ngpios:
    description: |
      Number of GPIO lines supported by this controller. Must be a multiple
      of 32 and not exceed 128.
    minimum: 32
    maximum: 128
    multipleOf: 32

  dout-init:
    description: |
      Array of 32-bit values specifying the initial output state for
      each GPIO bank. The number of elements should match the number
      of banks required for the specified ngpios (ceil(ngpios/32)).
      Each bit in a 32-bit value corresponds to one GPIO line.
    $ref: /schemas/types.yaml#/definitions/uint32-array
    minItems: 1
    maxItems: 4

  ltpi-support-gpio:
    description: |
      Enabling gpio support in SCM local capabilities.
      Configuring the local capability register based on the
      HPM remote capabilities.

  ltpi-support-i2c:
    description: |
      Enabling i2c support in SCM local capabilities.
      Configuring the local capability register based on the
      HPM remote capabilities.

  ltpi-support-uart:
    description: |
      Enabling uart support in SCM local capabilities.
      Configuring the local capability register based on the
      HPM remote capabilities.

  ltpi-support-data:
    description: |
      Enabling data support in SCM local capabilities.
      Configuring the local capability register based on the
      HPM remote capabilities.

  ltpi-support-oem:
    description: |
      Enabling oem support in SCM local capabilities.
      Configuring the local capability register based on the
      HPM remote capabilities. Currently SCM don't have support for OEM.

  ltpi-support-nl-gpio-count:
    description: |
      SCM supports maximum of 128 bit of nl-gpios.
      Configuring nl-gpio count in local SMC capabilities based on the
      gpio support enable and the HPM remote capabilities.

  ltpi-support-i2c-channels:
    description: |
      SCM supports maximum of 6 I2C channels.
      Configuring I2C channel in local capabilities based on the
      I2C support enable and the HPM remote capabilities.

  ltpi-support-i2c-echo:
    description: |
      Enabling I2C echo support in SCM local capabilities.
      Configuring the I2C echo support in the local capability register
      based on the HPM remote capabilities.

  ltpi-support-uart-flow-control:
    description: |
      Enabling UART flow control support in SCM local capabilities.
      Configuring the UART flow control support in the local capability
      register based on the HPM remote capabilities.

  ltpi-support-uart0:
    description: |
      Enabling uart0 support in SCM local capabilities.
      Configuring the local capability register based on the
      HPM remote capabilities.

  ltpi-support-uart1:
    description: |
      Enabling uart1 support in SCM local capabilities.
      Configuring the local capability register based on the
      HPM remote capabilities.

required:
  - compatible
  - reg
  - gpio-controller
  - '#gpio-cells'
  - interrupt-controller
  - '#interrupt-cells'
  - interrupts
  - ngpios
  - dout-init
  - ltpi-support-gpio
  - ltpi-support-i2c
  - ltpi-support-uart
  - ltpi-support-data
  - ltpi-support-nl-gpio-count
  - ltpi-support-i2c-channels
  - ltpi-support-i2c-echo
  - ltpi-support-uart-flow-control
  - ltpi-support-uart0
  - ltpi-support-uart1

additionalProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>

    mfd_ltpi0: ltpi@8000 {
        compatible = "axiado,ltpi";
        reg = <0x8000 0x2000>;
        gpio-controller;
        #gpio-cells = <2>;
        interrupt-controller;
        #interrupt-cells = <2>;
        interrupt-parent = <&gpio6>;
        interrupts = <18 IRQ_TYPE_LEVEL_HIGH>;
        ngpios = <128>;
        dout-init = <0x00000000 0x00000000>;
        ltpi-support-gpio;
        ltpi-support-i2c;
        ltpi-support-uart;
        ltpi-support-data;
        /* Number of NL GPIOs to be supported */
        /* SCM supports maximum 128 bits - 0x80 */
        ltpi-support-nl-gpio-count = <0x80>;
        /* LTPI - I2C supporting channels */
        /* bit 0 - ch 0, bit 1 - ch 1, ... */
        /* SCM supports maximum 6 channels */
        ltpi-support-i2c-channels = <0x3F>;
        /* LTPI - I2C Echo support */
        ltpi-support-i2c-echo;
        ltpi-support-uart0;
    };
