%YAML 1.2
---
$id: http://devicetree.org/schemas/serial/axiado,espi-uart.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Axiado Universal Asynchronous Receiver/Transmitter (UART)

maintainers:
  - Sanket Parmar <sparmar@axiado.com>
  - Satya Jena <sjena@axiado.com>
  - Makarand Pawagi <mpawagi@axiado.com>
  - Prasad Bolisetty <pbolisetty@axiado.com>

description: |
  The Axiado UART is based on the basic 8250 UART. Parent ESPI controller
  handles the UART packets and provides interrupt management.

  This controller is a child device of the Axiado MFD SPI bridge and supports
  implementations where register access is performed via SPI to the TCU.

properties:
  compatible:
    const: axiado,ax3000-espi-uart

  reg:
    description: Slave address of the UART device
    maxItems: 1

  clocks:
    items:
      - description: The clock the baudrate is derived from
      - description: The bus clock for register accesses

  clock-names:
    items:
      - const: uart_clk
      - const: pclk

  interrupts:
    description: Virtual IRQ bit

  channel-index:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: UART channel index. Supports up to 4 channel

  io-addr:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Base IO address used by ATU to route the packets

  fifo-size:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: FIFO size of ESPI side UART instance

  cpu-fifo-size:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: FIFO size of CPU side UART instance

required:
  - compatible
  - reg
  - clocks
  - clock-names
  - interrupts
  - interrupt-parent
  - channel-index
  - io-addr
  - fifo-size
  - cpu-fifo-size

unevaluatedProperties: false

examples:
  - |
    espi_uart0: espi-uart@40 {
        compatible = "axiado,ax3000-espi-uart";
        reg = <0x40 0x02>;
        interrupts = <5>;
        clock-names = "uart_clk", "pclk";
        clocks = <&refclk &refclk>;
        channel-index = <0>;
        io-addr = <0x3F8>;
        fifo-size = <16>;
        cpu-fifo-size = <64>;
        status = "disabled";
    };
