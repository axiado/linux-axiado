%YAML 1.2
---
$id: http://devicetree.org/schemas/display/axiado/axiado,db9000-lcdc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: DB9000 Display Controller

maintainers:
  - Makarand Pawagi <mpawagi@axiado.com>
  - SriNavmani A <srinavmani@axiado.com>
  - Prasad Bolisetty <pbolisetty@axiado.com>

description: |
  This is an display controller by Digital Blocks available for SoCs. The DB9000
  controller reads from the framebuffer to display on a single RGB interface.
  Output may be formatted in RGB or BGR.

properties:
    compatible:
      const: axiado,drm-db9000

    reg:
      maxItems: 1

    interrupts:
      maxItems: 1

    clocks:
      minItems: 2
      maxItems: 2
      description: |
        A phandle and clock-specifier pair to be used as a reference clock
        internal bus clock and pixel clock.

    clock-names:
      - items:
          - const: clk_disp
          - const: clk_pclk
        minItems: 2
        maxItems: 2

    port:
      type: object
      description: The panel endpoint connection.

    bits-per-pixel:
      description: |
        Default is 24. This selects the number of bits used to represent
        a single pixel within the controller.
      $ref: "/schemas/types.yaml#/definitions/uint32"
      enum: [8, 16, 24, 32]

    bus-width:
      description: |
         The width of the interface to the LCD panel. This is needed
         if the bits-per-pixel property is set to 16 or less, but the board
         connects to a 24-bit panel. In which case, the controller will shift the
         16-bit data to the most significant bits of the device. Default is 24.

    paddr-disp:
      $ref: /schemas/types.yaml#/definitions/uint32
      description: Offset into the reserved framebuffer region.

    memory-region:
      $ref: /schemas/types.yaml#/definitions/phandle
      description: Reserved framebuffer region (fixed physical range).

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names
  - port
  - bus-width
  - bits-per-pixel
  - memory-region
  - paddr-disp

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>

    disp_ctrl: disp_ctrl@80c00000 {
        compatible = "axiado,drm-db9000";
        reg = <0x80C00000 0x1000>;
        memory-region = <&pci_ep_disp>;
        interrupts = <0 14 IRQ_TYPE_LEVEL_HIGH>;
        clocks = <&clk_disp &clk_pclk>;
        clock-names = "clk_disp", "clk_pclk";
        bits-per-pixel = <32>;
        bus-width = <24>;
        paddr-disp = <0x40000000>;

        disp_out: port {
            #address-cells = <1>;
            #size-cells = <0>;

            disp_out_hdmi: endpoint@0 {
                reg = <0>;
                remote-endpoint = <&hdmi_in_disp>;
            };
        };
    };
...
