%YAML 1.2
---
$id: http://devicetree.org/schemas/display/axiado/axiado,ax3000-hdmi.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Axiado AX3000 HDMI TX Encoder

maintainers:
  - Makarand Pawagi <mpawagi@axiado.com>
  - SriNavmani A <srinavmani@axiado.com>
  - Prasad Bolisetty <pbolisetty@axiado.com>

description: |
  The HDMI transmitter is a Innosilicon HDMI TX controller IP
  with a companion PHY IP.

properties:
    compatible:
        const: axiado,ax3000-hdmi

    reg:
        maxItem: 1

    memory-region:
        maxItem: 1

    clocks:
        maxItem: 2

    clock-names:
      - items:
          - const: clk_disp
          - const: clk_pclk
        minItems: 2
        maxItems: 2

    interrupts:
        maxItem: 1

    ports:
        $ref: /schemas/graph.yaml#/properties/ports

        properties:
            port@0:
               $ref: /schemas/graph.yaml#/properties/port
               description:
                   Port node with one endpoint connected to the hdmi-connector node.

required:
  - compatible
  - reg
  - memory-region
  - clocks
  - clock-names
  - interrupts
  - ports

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>

    hdmi: hdmi@80C11000 {
        compatible = "axiado,ax3000-hdmi";
        reg = <0x00 0x80C11000 0x00 0x4000>;
        memory-region = <&pci_ep_disp>;
        interrupts = <16 IRQ_TYPE_LEVEL_HIGH>;
        clocks =  <&clk_disp>, <&clk_pclk>;
        clock-names = "clk_disp", "clk_pclk";
        #address-cells = <1>;
        #size-cells = <0>;

        ports {
            #address-cells = <1>;
            #size-cells = <0>;
            hdmi_in: port {
                #address-cells = <1>;
                #size-cells = <0>;
                hdmi_in_disp: endpoint@0 {
                    reg = <0>;
                    remote-endpoint = <&disp_out_hdmi>;
                };
            };
        };
    };
...
